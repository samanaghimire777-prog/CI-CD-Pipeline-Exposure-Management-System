name: CI/CD Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Backend Docker Image
      run: |
        cd backend
        docker build -t security-dashboard-backend:${{ github.sha }} .
        docker tag security-dashboard-backend:${{ github.sha }} security-dashboard-backend:latest

    - name: Build Frontend Docker Image
      run: |
        cd frontend
        docker build -t security-dashboard-frontend:${{ github.sha }} .
        docker tag security-dashboard-frontend:${{ github.sha }} security-dashboard-frontend:latest

    - name: Install Trivy
      run: |
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install trivy

    - name: Run Trivy Scan on Backend Image
      run: |
        trivy image --ignorefile .trivyignore --format json --output trivy-backend-results.json security-dashboard-backend:latest
        trivy image --ignorefile .trivyignore --format table security-dashboard-backend:latest

    - name: Run Trivy Scan on Frontend Image
      run: |
        trivy image --ignorefile .trivyignore --format json --output trivy-frontend-results.json security-dashboard-frontend:latest
        trivy image --ignorefile .trivyignore --format table security-dashboard-frontend:latest

    - name: Upload Trivy Results
      uses: actions/upload-artifact@v4
      with:
        name: trivy-scan-results
        path: |
          trivy-backend-results.json
          trivy-frontend-results.json
        retention-days: 30

    - name: Check for Vulnerabilities (Backend)
      run: |
        CRITICAL_COUNT=$(cat trivy-backend-results.json | jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length')
        HIGH_COUNT=$(cat trivy-backend-results.json | jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length')
        
        echo "Backend critical vulnerabilities: $CRITICAL_COUNT"
        echo "Backend high vulnerabilities: $HIGH_COUNT"

    - name: Check for Vulnerabilities (Frontend)
      run: |
        CRITICAL_COUNT=$(cat trivy-frontend-results.json | jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length')
        HIGH_COUNT=$(cat trivy-frontend-results.json | jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length')

        echo "Frontend critical vulnerabilities: $CRITICAL_COUNT"
        echo "Frontend high vulnerabilities: $HIGH_COUNT"

    - name: Generate Scan Summary
      if: always()
      run: |
        echo "## 🔒 Security Scan Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Backend Image:** security-dashboard-backend:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "**Frontend Image:** security-dashboard-frontend:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "**Scan Date:** $(date)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        BACKEND_CRITICAL=$(cat trivy-backend-results.json | jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length')
        BACKEND_HIGH=$(cat trivy-backend-results.json | jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length')
        FRONTEND_CRITICAL=$(cat trivy-frontend-results.json | jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length')
        FRONTEND_HIGH=$(cat trivy-frontend-results.json | jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length')
        
        echo "| Image | Critical | High |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|----------|------|" >> $GITHUB_STEP_SUMMARY
        echo "| Backend | $BACKEND_CRITICAL | $BACKEND_HIGH |" >> $GITHUB_STEP_SUMMARY
        echo "| Frontend | $FRONTEND_CRITICAL | $FRONTEND_HIGH |" >> $GITHUB_STEP_SUMMARY

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Backend Dependencies
      run: |
        cd backend
        pip install -r requirements.txt

    # Optional: Post results to API endpoint if backend is hosted
    # - name: Post Scan Results to Dashboard
    #   if: success()
    #   env:
    #     DASHBOARD_API_URL: ${{ secrets.DASHBOARD_API_URL }}
    #     DASHBOARD_API_KEY: ${{ secrets.DASHBOARD_API_KEY }}
    #   run: |
    #     curl -X POST "$DASHBOARD_API_URL/scan" \
    #       -H "Authorization: Bearer $DASHBOARD_API_KEY" \
    #       -H "Content-Type: application/json" \
    #       -d @trivy-results.json

  frontend-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci

    - name: Build Frontend
      run: |
        cd frontend
        npm run build

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: frontend/dist
        retention-days: 7
