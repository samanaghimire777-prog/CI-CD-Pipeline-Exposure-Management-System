services:
  trivy-db-init:
    image: aquasec/trivy:latest
    container_name: trivy-db-init
    command: ["image", "--download-db-only", "--cache-dir", "/trivy-cache"]
    volumes:
      - trivy-cache:/trivy-cache
    restart: "no"

  backend:
    build: ./backend
    container_name: security-dashboard-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - vulnerability-data:/app/data
      - trivy-cache:/root/.cache/trivy
    environment:
      - PYTHONUNBUFFERED=1
      - TRIVY_CACHE_DIR=/root/.cache/trivy
      - DOCKER_HOST=unix:///var/run/docker.sock
    restart: unless-stopped
    depends_on:
      trivy-db-init:
        condition: service_completed_successfully

  frontend:
    build: ./frontend
    container_name: security-dashboard-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  vulnerability-data:
  trivy-cache:
